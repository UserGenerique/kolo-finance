services:
  kolo-api:
    build: .
    container_name: kolo-finance-api
    ports:
      - "8080:8080"
    env_file:
      - .env
    restart: unless-stopped

  whatsapp-go:
    image: ghcr.io/aldinokemal/go-whatsapp-web-multidevice:latest
    container_name: kolo-whatsapp-go
    command: ["rest"]
    ports:
      - "127.0.0.1:3000:3000"
    environment:
      APP_PORT: 3000
      APP_HOST: 0.0.0.0
      APP_BASIC_AUTH: ${GOWA_USERNAME}:${GOWA_PASSWORD}
      WHATSAPP_WEBHOOK: http://kolo-api:8080/api/webhook/gowa
      WHATSAPP_WEBHOOK_SECRET: ${GOWA_WEBHOOK_SECRET}
      WHATSAPP_WEBHOOK_EVENTS: message
      WHATSAPP_WEBHOOK_INCLUDE_OUTGOING: "false"
    volumes:
      - gowa-storages:/app/storages
      - gowa-statics:/app/statics
    depends_on:
      - kolo-api
    restart: unless-stopped

volumes:
  gowa-storages:
  gowa-statics:
