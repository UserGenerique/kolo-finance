<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kolo Finance</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <link href="/css/style.css" rel="stylesheet">
</head>
<body>

    <!-- Sidebar overlay (mobile) -->
    <div class="sidebar-overlay" id="sidebarOverlay"></div>

    <!-- Sidebar -->
    <aside class="sidebar" id="sidebar">
        <div class="sidebar-header">
            <div class="logo">Kolo<span>Finance</span></div>
        </div>

        <nav class="sidebar-nav">
            <a class="nav-item active" data-view="dashboard">
                <i class="bi bi-grid"></i> Tableau de bord
            </a>
            <a class="nav-item" data-view="expenses">
                <i class="bi bi-receipt"></i> Dépenses
            </a>
            <a class="nav-item" data-view="reports">
                <i class="bi bi-file-earmark-bar-graph"></i> Rapports
            </a>
            <a class="nav-item" data-view="agents">
                <i class="bi bi-people"></i> Utilisateurs
            </a>
            <a class="nav-item" data-view="funds">
                <i class="bi bi-wallet2"></i> Fonds
            </a>
            <a class="nav-item" data-view="pendingFunds">
                <i class="bi bi-check2-square"></i> Affectations
            </a>
        </nav>

        <div class="sidebar-footer">
            <div class="d-flex align-items-center gap-2 mb-2">
                <i class="bi bi-person-circle"></i>
                <span id="userName">—</span>
            </div>
            <div class="d-flex align-items-center gap-2 mb-2">
                <i class="bi bi-shield-check"></i>
                <span id="userRole">—</span>
            </div>
            <div class="d-flex align-items-center gap-2 mb-2">
                <i class="bi bi-building"></i>
                <span id="orgName">—</span>
            </div>
            <a href="#" id="logoutBtn" class="text-decoration-none" style="color: var(--kf-accent)">
                <i class="bi bi-box-arrow-left"></i> Déconnexion
            </a>
        </div>
    </aside>

    <!-- Main content -->
    <div class="main-content">
        <!-- Topbar -->
        <header class="topbar">
            <div class="d-flex align-items-center gap-3">
                <button class="sidebar-toggle" id="sidebarToggle">
                    <i class="bi bi-list"></i>
                </button>
                <span class="topbar-title" id="pageTitle">
                    <i class="bi bi-grid"></i> Tableau de bord
                </span>
            </div>
            <div class="d-flex align-items-center gap-2 text-muted" style="font-size:0.85rem">
                <i class="bi bi-whatsapp" style="color:#25D366"></i> WhatsApp connecté
            </div>
        </header>

        <!-- Page content -->
        <main class="page-content" id="pageContent">
            <div class="spinner-wrapper">
                <div class="spinner-border text-primary"></div>
            </div>
        </main>
    </div>

    <!-- Scripts (order matters: api → views → app) -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.7/dist/chart.umd.min.js"></script>
    <script src="/js/api.js"></script>
    <script src="/js/views.js"></script>
    <script src="/js/app.js"></script>
</body>
</html>
