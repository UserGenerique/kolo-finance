server:
  port: 8080

spring:
  application:
    name: kolo-finance

  datasource:
    url: ${SUPABASE_DB_URL}
    username: ${SUPABASE_DB_USER}
    password: ${SUPABASE_DB_PASSWORD}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

  flyway:
    enabled: true
    locations: classpath:db/migration

# --- WhatsApp ---
whatsapp:
  provider: ${WHATSAPP_PROVIDER:gowa}
  token: ${WHATSAPP_TOKEN:}
  phone-number-id: ${WHATSAPP_PHONE_NUMBER_ID:}
  verify-token: ${WHATSAPP_VERIFY_TOKEN:kolo-verify-token}
  api-url: ${WHATSAPP_API_URL:https://graph.facebook.com/v21.0}
  gowa:
    base-url: ${GOWA_BASE_URL:http://localhost:3000}
    username: ${GOWA_USERNAME:}
    password: ${GOWA_PASSWORD:}
    device-id: ${GOWA_DEVICE_ID:}
    webhook-secret: ${GOWA_WEBHOOK_SECRET:}

# --- OpenRouter AI ---
openrouter:
  api-key: ${OPENROUTER_API_KEY}
  api-url: https://openrouter.ai/api/v1/chat/completions
  model: ${OPENROUTER_MODEL:google/gemma-4-31b-it:free}

# --- App security ---
app:
  api-key: ${APP_API_KEY}
  public-url: ${APP_PUBLIC_URL:https://kolo-finance.duckdns.org}
# --- Platform admin bootstrap ---
platform:
  admin:
    phone: ${PLATFORM_ADMIN_PHONE:}
    name: ${PLATFORM_ADMIN_NAME:Super Admin}
    password: ${PLATFORM_ADMIN_PASSWORD:}

logging:
  level:
    com.kolofinance: DEBUG
    org.springframework.web: INFO
